{% extends 'todo/base.html' %}
{% block content %}
<style>
    body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #333; }
    .button-group { background-color: #007bff; color: white; border: none; margin-top: 20px; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; }
    #delete-button { background-color: #ff1122; }
    #delete-button:hover { background-color: #cc1122; }
</style>
<div class="container" style="margin-top: 15px">
    <h1>정말 삭제하시겠습니까?</h1>
    <p>{{ object.title }}</p>
    <form method="POST">
        {% csrf_token %}
        <button id="delete-button" type="submit" class="button-group">삭제하기</button>
        <a href="{% url 'cbv_todo_list' %}"><button type="button" class="button-group">취소</button></a>
    </form>
</div>
{% endblock %}
