<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <div>
        <h2>Login</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
            <span>
                아직 회원이 아니라면
                <a href="{% url 'signup' %}">회원가입</a>
            </span>
        </form>
    </div>
</body>
</html>
